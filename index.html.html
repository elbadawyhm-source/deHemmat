      <h2 class="sec">Quick quiz</h2>

const quizData = [
  {q:"What does the equivalence point represent in a titration?",opts:["The point where the indicator changes colour","The theoretical point where acid moles exactly equal base moles stoichiometrically","The midpoint of the titration","The point where pH = 7"],ans:1,exp:"The equivalence point is a theoretical concept based on stoichiometry. The end point is the observable colour change."},
  {q:"Why should the conical flask only be rinsed with distilled water (not the analyte)?",opts:["Distilled water is cheaper","Analyte would react with the glass","Rinsing with distilled water changes volume but not the number of moles of analyte delivered by the pipette","The analyte would evaporate"],ans:2,exp:"The pipette delivers an exact number of moles. Adding water increases volume but not moles, so the calculation is unaffected."},
  {q:"HCl is titrated with NaOH. Which indicator is most appropriate?",opts:["Methyl orange (pH 3.1–4.4)","Universal indicator","Phenolphthalein (pH 8.2–10.0)","Either phenolphthalein or methyl orange — both work for strong acid + strong base"],ans:3,exp:"For strong acid vs strong base the equivalence point is at pH 7. Both methyl orange and phenolphthalein have the steep part of the curve within their transition ranges."},
  {q:"25.00 mL of NaOH was titrated with 0.100 mol/L HCl; titre = 20.00 mL. What is c(NaOH)?",opts:["0.100 mol/L","0.0800 mol/L","0.125 mol/L","0.200 mol/L"],ans:1,exp:"n(HCl) = 0.100 × 0.02000 = 2.000 × 10⁻³ mol. Ratio 1:1. c(NaOH) = 2.000 × 10⁻³ ÷ 0.02500 = 0.0800 mol/L."},
  {q:"An air bubble in the burette tip at the start of a titration will cause the titre to appear:",opts:["Too small","Too large","Unchanged — bubbles don't affect the reading","Variable and unpredictable"],ans:1,exp:"The bubble occupies volume in the tip. When it escapes during the titration, it is recorded as if titrant was delivered, making the titre appear larger than it truly was."},
  {q:"Which substance CANNOT serve as a primary standard?",opts:["Anhydrous sodium carbonate (Na₂CO₃)","Potassium hydrogen phthalate (KHP)","Sodium hydroxide (NaOH)","Borax (Na₂B₄O₇·10H₂O)"],ans:2,exp:"NaOH absorbs water and CO₂ from air, so its composition is not reliably known. It must be standardised as a secondary standard by titrating against a primary standard like KHP."},
];

let currentQ = 0;
let answered = [];

function renderQuiz() {
  const c = document.getElementById('quiz-container');
  if (!c) return;
  const q = quizData[currentQ];
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="badge badge-blue">Question ${currentQ+1} of ${quizData.length}</span>
      <span style="font-size:12px;color:var(--color-text-tertiary)">${answered.filter(Boolean).length} correct so far</span>
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-options" id="opts-wrap">
      ${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="selectOpt(${i})">${String.fromCharCode(65+i)}.&nbsp; ${o}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="qfb"></div>
    <div class="quiz-nav">
      <span class="qn-label" id="qn-label"></span>
      ${currentQ < quizData.length-1 ? `<button class="next-q" id="nxt-btn" style="display:none" onclick="nextQ()">Next question →</button>` : `<button class="next-q" id="nxt-btn" style="display:none" onclick="showScore()">See final score →</button>`}
    </div>
  `;
}

function selectOpt(i) {
  const q = quizData[currentQ];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.disabled=true);
  const fb = document.getElementById('qfb');
  const nxt = document.getElementById('nxt-btn');
  const lbl = document.getElementById('qn-label');
  if (i === q.ans) {
    opts[i].classList.add('correct');
    fb.className='quiz-feedback show good';
    fb.innerHTML='<strong>Correct!</strong> '+q.exp;
    answered.push(true);
    lbl.textContent='';
  } else {
    opts[i].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    fb.className='quiz-feedback show bad';
    fb.innerHTML='<strong>Not quite.</strong> '+q.exp;
    answered.push(false);
    lbl.textContent='';
  }
  if (nxt) nxt.style.display='block';
}

function nextQ() {
  currentQ++;
  renderQuiz();
}

function showScore() {
  const c = document.getElementById('quiz-container');
  const sc = answered.filter(Boolean).length;
  const pct = Math.round((sc/quizData.length)*100);
  c.innerHTML=`
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:48px;font-weight:500;color:${pct>=80?'#27500A':pct>=60?'#633806':'#791F1F'}">${sc}/${quizData.length}</div>
      <div style="font-size:18px;color:var(--color-text-secondary);margin:6px 0">${pct}%</div>
      <div style="font-size:14px;color:var(--color-text-tertiary);margin-bottom:20px">${pct>=80?'Excellent! You have a strong grasp of the material.':pct>=60?'Good effort — review the chapters where you struggled.':'Keep studying — revisit the core chapters and try again.'}</div>
      <button onclick="restartQuiz()" style="font-size:14px;cursor:pointer;padding:8px 20px">Retake quiz</button>
    </div>
  `;
}

function restartQuiz() {
  currentQ=0; answered=[];
  renderQuiz();
}

function toggleAns(i) {
  const d = document.getElementById('ans-'+i);
  const btn = d.previousElementSibling;
  if (d.style.display==='none') { d.style.display='block'; btn.textContent='Hide answer'; }
  else { d.style.display='none'; btn.textContent='Show answer'; }
}

function buildCalc() {
  const updateCalc = () => {
    const cc = parseFloat(document.getElementById('cc').value)||0;
    const vc = parseFloat(document.getElementById('vc').value)||0;
    const va = parseFloat(document.getElementById('va').value)||0;
    const ratio = parseFloat(document.getElementById('ratio').value)||1;
    const nc = cc*(vc/1000);
    const na = nc*ratio;
    const ca = na/(va/1000);
    const out = document.getElementById('calc-out');
    if (!out) return;
    out.innerHTML=`
      n(titrant) = ${cc.toFixed(4)} × ${(vc/1000).toFixed(5)} = <strong>${nc.toExponential(4)} mol</strong><br>
      n(analyte) = ${nc.toExponential(4)} × ${ratio} = <strong>${na.toExponential(4)} mol</strong><br>
      c(analyte) = ${na.toExponential(4)} ÷ ${(va/1000).toFixed(5)} = <strong>${ca.toFixed(4)} mol/L</strong>
    `;
  };
  ['cc','vc','va','ratio'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('input',updateCalc);
  });
  updateCalc();
}

function switchChapter(idx) {
  document.querySelectorAll('.chapter').forEach((c,i)=>{
    c.classList.toggle('active', i===idx);
  });
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{
    b.classList.toggle('active', i===idx);
  });
  const dots = document.querySelectorAll('.prog-dot');
  dots.forEach((d,i)=>d.classList.toggle('done', i<=idx));
  if (idx===5) setTimeout(buildCalc, 50);
  if (idx===9) setTimeout(renderQuiz, 50);
  document.getElementById('content-area').scrollTop=0;
}

function init() {
  const list = document.getElementById('ch-list');
  const area = document.getElementById('content-area');
  const prog = document.getElementById('prog-row');
  chapters.forEach((ch,i) => {
    const btn = document.createElement('button');
    btn.className='ch-btn'+(i===0?' active':'');
    btn.innerHTML=`<span class="ch-num">${i+1}</span><span class="ch-label">${ch.title}</span>`;
    btn.onclick=()=>switchChapter(i);
    list.appendChild(btn);
    const div = document.createElement('div');
    div.className='chapter'+(i===0?' active':'');
    div.innerHTML=`
      <div class="ch-hero">
        <div class="ch-hero-tag">Chapter ${i+1}</div>
        <div class="ch-hero-title">${ch.full}</div>
        <div class="ch-hero-desc">${ch.desc}</div>
      </div>
      ${ch.content}
    `;
    area.appendChild(div);
    const dot=document.createElement('div');
    dot.className='prog-dot'+(i===0?' done':'');
    prog.appendChild(dot);
  });
  buildCalc();
}

init();
</script>
